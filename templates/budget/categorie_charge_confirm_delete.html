{% extends "base.html" %}

{% block title %}Supprimer une catégorie de charge — MAGMA{% endblock %}

{% block content %}
<div class="container">
    <div class="card" style="max-width: 480px; margin: 0 auto;">
        <div class="card-header">
            <i class="bi bi-exclamation-triangle me-2"></i>Confirmer la suppression
        </div>
        <div class="card-body">
            <p>Supprimer définitivement <strong>{{ object.nom }}</strong> ?</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger w-100">
                    <i class="bi bi-trash me-1"></i>Supprimer
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
